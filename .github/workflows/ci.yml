name: CI pipeline

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t flask-app:${{ github.sha }} .
      - name: Run container
        run: | 
          docker run -d --name flask-test -p 5000:5000 \
          -e DB_USERNAME=test -e DB_PASSWORD=test \
          -e DB_HOST=localhost -e DB_NAME=test \
          -e REDIS_HOST=localhost flask-app:${{ github.sha }}
      - name: Wait for container to be ready
        run: sleep 5
      - name: Check if container is running
        run: docker ps -a
      - name: Debug the container logs
        run: docker logs flask-test 
      - name: Health check
        run: | 
          curl --fail http://localhost:5000/health || exit 1
      - name: Remove container
        run: | 
          docker stop flask-test
          docker rm flask-test
