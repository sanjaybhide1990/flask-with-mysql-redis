name: CI pipeline

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services: 
      mysql:
        image: mysql:9.5.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testdb
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306
      redis:
        image: redis:alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t flask-app:${{ github.sha }} .
      - name: Run container
        run: | 
          docker run -d --name flask-test \
          --network host \
          -e DB_USERNAME=root \
          -e DB_PASSWORD=testpass \
          -e DB_HOST=127.0.0.1 \
          -e DB_NAME=testdb \
          -e REDIS_HOST=127.0.0.1 \
          flask-app:${{ github.sha }}
      - name: Wait for Flask to be ready
        run: sleep 10
      - name: Health check
        run: | 
          curl --fail http://localhost:5000/health || exit 1
      - name: Remove container
        run: | 
          docker stop flask-test
          docker rm flask-test
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push image to GHCR
        run: |
          docker tag flask-app:${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/flask-app:${{ github.sha }}
          docker tag flask-app:${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/flask-app:latest
          docker push ghcr.io/${{ github.repository_owner }}/flask-app:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/flask-app:latest
